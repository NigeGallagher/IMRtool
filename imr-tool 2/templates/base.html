<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}IMR Submissions{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #161616;
      --paper: #f6f4ef;
      --red: #c4291b;
      --line: #161616;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: 'Source Serif 4', serif;
      font-size: 16px;
      line-height: 1.5;
    }
    .wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }
    .masthead {
      border-bottom: 3px solid var(--line);
      padding-bottom: 16px;
      margin-bottom: 32px;
    }
    .masthead .kicker {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 13px;
      color: var(--red);
    }
    .masthead h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.01em;
      font-size: 38px;
      margin: 4px 0 0;
      line-height: 1.05;
    }
    label {
      display: block;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 13px;
      margin: 20px 0 6px;
    }
    input[type=text], input[type=email], input[type=password], textarea, select {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid var(--ink);
      background: #fff;
      font-family: 'Source Serif 4', serif;
      font-size: 15px;
      border-radius: 0;
    }
    textarea { min-height: 90px; resize: vertical; }
    input[type=file] {
      width: 100%;
      font-family: 'Source Serif 4', serif;
      margin-top: 4px;
    }
    button {
      margin-top: 28px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 15px;
      padding: 13px 28px;
      cursor: pointer;
    }
    button:hover { background: var(--red); }
    .flash {
      background: #fff3f1;
      border-left: 4px solid var(--red);
      padding: 10px 14px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .success {
      background: #f0f5ec;
      border-left: 4px solid #3c6b35;
      padding: 16px 18px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 17px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .meta { font-size: 13px; color: #6b6b6b; margin-top: -8px; }
    a { color: var(--red); }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid #ccc; vertical-align: top; }
    th { font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; letter-spacing: 0.04em; font-size: 12px; }
    .dl { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; text-transform: uppercase; font-size: 13px; }
    .logout { float: right; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em; }
  </style>
</head>
<body>
  <div class="wrap">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
